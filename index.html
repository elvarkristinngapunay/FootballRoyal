<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Higher or Lower</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #2d5016 100%);
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            font-size: 2.2rem;
        }
        /* START SCREEN */
        .start-screen {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .start-screen h2 {
            color: #1a472a;
            margin-bottom: 15px;
        }
        .start-screen p {
            color: #666;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        .category-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: linear-gradient(145deg, #1a472a, #2d5016);
            color: white;
            transition: transform 0.2s;
        }
        .category-btn:hover {
            transform: scale(1.02);
        }
        /* GAME SCREEN */
        .game-screen {
            display: none;
        }
        .top-info {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        .info-box {
            background: rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 20px;
            color: white;
            font-size: 1rem;
        }
        .lives { color: #ff6b6b; }
        .score { color: #ffd700; }
        .progress { color: #87CEEB; }
        .back-btn {
            background: #666;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .back-btn:hover {
            background: #888;
        }
        /* PLAYERS AREA */
        .players-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .player-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            width: 250px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        .player-image {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #1a472a;
            margin-bottom: 10px;
            background: #ddd;
        }
        .player-card h3 {
            color: #1a472a;
            font-size: 1.2rem;
            margin-bottom: 5px;
        }
        .player-info {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }
        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #1a472a;
            margin: 10px 0;
        }
        .stat-label {
            color: #666;
            font-size: 0.9rem;
            text-transform: uppercase;
        }
        .vs-badge {
            font-size: 1.8rem;
            color: #ffd700;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            align-self: center;
        }
        /* BUTTONS */
        .game-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .higher-btn, .lower-btn {
            padding: 18px 50px;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .higher-btn {
            background: linear-gradient(145deg, #4CAF50, #388E3C);
            color: white;
        }
        .lower-btn {
            background: linear-gradient(145deg, #f44336, #c62828);
            color: white;
        }
        .higher-btn:hover, .lower-btn:hover {
            transform: scale(1.05);
        }
